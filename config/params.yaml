sequence:
  path: "/media/nardi/CrucialX9/Nardi/Nardi_R-AL_2026/VolumeDeform/boxing"
  format: "tum"   # tum | icl | raw
  depth_scale: 0.001
  start_frame: 0
  max_frames: -1

camera:
  fx: 570.342
  fy: 570.342
  cx: 320.0
  cy: 240.0
  width: 640
  height: 480

tsdf:
  dims: [256, 256, 256]
  voxel_size: 0.006
  truncation: 0.03
  origin: [-0.768, -0.768, 0.3]

solver:
  gn_iterations: 100
  pcg_iterations: 100
  lambda_smooth: 1.0

warp:
  node_radius: 0.05
  node_min_dist: 0.025
  max_nodes: 4096

icp:
  dist_threshold: 0.05
  angle_threshold: 0.7

bbox:
  enabled: true
  min_pt: [-1.0, -1.0, 0.1]
  max_pt: [0.5, 0.5, 0.8]

visualizer:
  enabled: true